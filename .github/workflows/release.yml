name: 'Release Apps (Win & Mac)'

on:
  push:
    tags:
      - 'v*' # Trigger workflow only when creating a tag like "v1.0.0"

jobs:
  release:
    permissions:
      contents: write
      
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'    # Windows 10/11 (.exe / .msi)
            args: ''
          - platform: 'macos-latest'      # Apple Silicon M1/M2/M3 (.dmg / .app)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-15-intel'    # Intel Macs (.dmg / .app)
            args: '--target x86_64-apple-darwin'

          - platform: 'ubuntu-22.04'      # Linux (.deb / .AppImage)
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Upload Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        with:
          tagName: run-action
          releaseName: 'isoTrainer ${{ github.ref_name }}'
          releaseBody: 'Release notes generated automatically by GitHub Actions.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
